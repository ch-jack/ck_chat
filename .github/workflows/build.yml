name: Build ck_chat

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Validate and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 zip

      - name: Check JavaScript
        run: node --check html/app.js

      - name: Check Lua syntax
        run: |
          luac5.4 -p config.lua client.lua server.lua framework/client.lua framework/server.lua fxmanifest.lua

      - name: Build package
        shell: pwsh
        run: ./scripts/build.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ck_chat
          path: dist/ck_chat.zip

  notify-build-success:
    name: Send build email
    needs: build
    if: ${{ github.event_name != 'pull_request' && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Call existing CK mail API
        shell: bash
        env:
          CK_API_SHARED_SECRET: ${{ secrets.CK_API_SHARED_SECRET }}
        run: |
          set -euo pipefail
          if [[ -z "${CK_API_SHARED_SECRET:-}" ]]; then
            echo "::error::CK_API_SHARED_SECRET is not configured"
            exit 1
          fi

          payload="$(jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg workflow "$GITHUB_WORKFLOW" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_number "$GITHUB_RUN_NUMBER" \
            --arg event "$GITHUB_EVENT_NAME" \
            --arg ref "$GITHUB_REF" \
            --arg ref_name "$GITHUB_REF_NAME" \
            --arg sha "$GITHUB_SHA" \
            --arg actor "$GITHUB_ACTOR" \
            --arg run_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --arg repository_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" \
            '{
              type: "github_actions_build_success",
              repository: $repository,
              workflow: $workflow,
              run_id: $run_id,
              run_number: $run_number,
              event: $event,
              ref: $ref,
              ref_name: $ref_name,
              sha: $sha,
              actor: $actor,
              result: "success",
              run_url: $run_url,
              repository_url: $repository_url
            }')"

          curl --fail-with-body --silent --show-error \
            --retry 3 \
            --retry-all-errors \
            --request POST \
            --header "Content-Type: application/json" \
            --header "X-CK-API-Key: ${CK_API_SHARED_SECRET}" \
            --data "$payload" \
            "https://api.ckcloud.de5.net/api/admin/test-email"
